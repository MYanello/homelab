---
- name: Update and Reboot Ubuntu Hosts
  hosts: ubuntu_hosts
  become: true
  gather_facts: true
  serial: 1 # "{{ serial | default('100%') }}" # Update all at once by default, or use -e "serial=1" for one-at-a-time

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Check available updates before upgrading
      ansible.builtin.shell: |
        apt list --upgradable 2>/dev/null | grep -v "^Listing" | wc -l
      register: updates_count
      changed_when: false

    - name: Display available updates
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ updates_count.stdout }} packages available\
          \ for upgrade"

    - name: Upgrade all packages to latest version
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_result

    - name: Display upgrade summary
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} upgrade summary:
          - Changed: {{ apt_result.changed }}
          - Packages upgraded: {{ updates_count.stdout }}
          {% if apt_result.changed %}
          - Packages installed: {{ apt_result.stdout_lines | select('search', '^Inst ') | list | length | default(0) }}
          {% endif %}
      when: updates_count.stdout | int > 0

    - name: Display no updates message
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: No updates available"
      when: updates_count.stdout | int == 0

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Display reboot requirement
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Reboot {{ 'IS' if reboot_required.stat.exists else 'is NOT' }}\
          \ required"

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after package updates"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required.stat.exists
      register: reboot_result

    - name: Display reboot status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ 'Rebooted successfully' if reboot_result.changed else 'No reboot needed' }}"

- name: Final Summary
  hosts: ubuntu_hosts
  gather_facts: false
  tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: "✓ All {{ ansible_play_hosts | length }} hosts updated successfully!"
      run_once: true
