---
- name: Update and Reboot Ubuntu Hosts
  hosts: ubuntu_hosts
  become: true
  gather_facts: true
  any_errors_fatal: false
  ignore_unreachable: true
  serial: 1

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Check available updates before upgrading
      ansible.builtin.shell: |
        apt list --upgradable 2>/dev/null | grep -v "^Listing" | wc -l
      register: updates_count
      changed_when: false

    - name: Display available updates
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ updates_count.stdout }} packages available\
          \ for upgrade"
      when: updates_count.stdout is defined

    - name: Upgrade all packages to latest version
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_result
      when: updates_count.stdout is defined

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: updates_count.stdout is defined

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after package updates"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required.stat is defined and reboot_required.stat.exists
      register: reboot_result

    - name: Store result facts for summary
      ansible.builtin.set_fact:
        host_update_summary:
          packages_upgraded: "{{ updates_count.stdout | default('0') }}"
          was_rebooted: "{{ reboot_result.changed | default(false) }}"
          failed: false
      when: updates_count.stdout is defined

    - name: Store failure fact for summary
      ansible.builtin.set_fact:
        host_update_summary:
          packages_upgraded: "0"
          was_rebooted: false
          failed: true
      when: updates_count.stdout is not defined

- name: Final Summary
  hosts: ubuntu_hosts
  gather_facts: false
  tasks:
    - name: Build summary report
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════
                     UPDATE SUMMARY REPORT
          ══════════════════════════════════════════
          {% for host in ansible_play_hosts %}
          {% set summary = hostvars[host].host_update_summary | default({'failed': true, 'packages_upgraded': '0', 'was_rebooted': false}) %}
          {% if summary.failed %}
          ✗ {{ host }}: UNREACHABLE / FAILED
          {% else %}
          ✓ {{ host }}: {{ summary.packages_upgraded }} packages upgraded{{ ' (rebooted)' if summary.was_rebooted else '' }}
          {% endif %}
          {% endfor %}
          ══════════════════════════════════════════
          Hosts succeeded: {{ ansible_play_hosts | map('extract', hostvars) | selectattr('host_update_summary.failed', 'equalto', false) | list | length }}
          Hosts failed:    {{ ansible_play_hosts | map('extract', hostvars) | selectattr('host_update_summary.failed', 'equalto', true) | list | length }}
          ══════════════════════════════════════════
      run_once: true
