---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./image-catalog.yaml
  - https://github.com/cloudnative-pg/artifacts//image-catalogs-extensions

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: "0.29.0"
    releaseName: cloudnative-pg
    namespace: cnpg
    valuesFile: ./values.yaml
  - name: plugin-barman-cloud
    repo: https://cloudnative-pg.github.io/charts
    version: "0.7.0"
    releaseName: cnpg-plugin-barman-cloud
    namespace: cnpg
    valuesFile: ./values.yaml
