# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:5bcb5c9269660d7ef06af431f0117df2bb3b007ab0c6b92c326b796b63aaee49
  version: v1.35.0+k3s1
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
  prepare:
    args:
    - prepare
    - server-plan
    image: rancher/k3s-upgrade@sha256:5bcb5c9269660d7ef06af431f0117df2bb3b007ab0c6b92c326b796b63aaee49
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:5bcb5c9269660d7ef06af431f0117df2bb3b007ab0c6b92c326b796b63aaee49
  version: v1.35.0+k3s1
