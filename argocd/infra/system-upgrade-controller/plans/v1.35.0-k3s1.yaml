---
# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:5b6936ab682b1221ae61e3ccb6d2eb0cb1e8249b3faeea2d7b5e1084233470b8
  version: v1.35.0+k3s1
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    args:
      - prepare
      - server-plan
    image: rancher/k3s-upgrade@sha256:5b6936ab682b1221ae61e3ccb6d2eb0cb1e8249b3faeea2d7b5e1084233470b8
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:5b6936ab682b1221ae61e3ccb6d2eb0cb1e8249b3faeea2d7b5e1084233470b8
  version: v1.35.0+k3s1
