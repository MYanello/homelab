# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:71aad4791c1bda7e1fb19741a7049ad20472a8939a85499c0616a2f170d02bb5
  version: v1.33.4+k3s1
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
  prepare:
    args:
    - prepare
    - server-plan
    image: rancher/k3s-upgrade@sha256:71aad4791c1bda7e1fb19741a7049ad20472a8939a85499c0616a2f170d02bb5
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:71aad4791c1bda7e1fb19741a7049ad20472a8939a85499c0616a2f170d02bb5
  version: v1.33.4+k3s1
