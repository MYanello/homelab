# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:8448c66782e42c7dd562408f5494f2a83ba4086d261dfba2555317d087ce994b
  version: v1.33.4+k3s1
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
  prepare:
    args:
    - prepare
    - server-plan
    image: rancher/k3s-upgrade@sha256:8448c66782e42c7dd562408f5494f2a83ba4086d261dfba2555317d087ce994b
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:8448c66782e42c7dd562408f5494f2a83ba4086d261dfba2555317d087ce994b
  version: v1.33.4+k3s1
