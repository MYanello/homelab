# Server plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:45836479a084738dc688dfd808d25e4baea7fa251e9c6e8d6fd2fa0a69dbd50e
  version: v1.34.3-rc7+k3s1
---
# Agent plan
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
  prepare:
    args:
    - prepare
    - server-plan
    image: rancher/k3s-upgrade@sha256:45836479a084738dc688dfd808d25e4baea7fa251e9c6e8d6fd2fa0a69dbd50e
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade@sha256:45836479a084738dc688dfd808d25e4baea7fa251e9c6e8d6fd2fa0a69dbd50e
  version: v1.34.3-rc7+k3s1
