---
gitea:
  admin:
    existingSecret: forgejo-secrets
  oauth:
    - name: "Authentik"
      provider: openidConnect
      existingSecret: forgejo-secrets
      autoDiscoverUrl: https://authentik.yanello.net/application/o/forgejo/.well-known/openid-configuration
      iconUrl: "https://goauthentik.io/img/icon.png"
      scopes: "email profile forgejo"
  config:
    server:
      ROOT_URL: https://forgejo.yanello.net/
      ENABLE_AUTO_REGISTRATION: "true"
      DOMAIN: "forgejo.yanello.net"
      SSH_DOMAIN: "forgejo-ssh.yanello.net"
      SSH_PORT: "22"
    actions:
      ENABLED: "true"
    # database:
    #   DB_TYPE: postgres
    #   HOST: db-rw.forgejo.svc.cluster.local:5432
    #   NAME: forgejodb
    #   USER: forgejo
  # additionalConfigFromEnvs:
  #   - name: GITEA__database__PASSWD
  #     valueFrom:
  #       secretKeyRef:
  #         name: db-app
  #         key: password

readinessProbe:
  enabled: true
  httpGet:
    path: /api/healthz
    port: http
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 5
livenessProbe:
  enabled: true
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 10

service:
  ssh:
    type: LoadBalancer
    port: 22
    annotations:
      io.cilium/lb-ipam-ips: 10.10.8.102

persistence:
  enabled: true
  storageClass: longhorn-xfs
  accessMode: ReadWriteMany
  size: 10Gi

metrics:
  enabled: true
