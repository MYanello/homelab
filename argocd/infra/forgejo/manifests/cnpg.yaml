---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: db
spec:
  instances: 1
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql-system-trixie
    major: 18
  storage:
    size: 20Gi
    storageClass: longhorn-xfs
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "512MB"
  bootstrap:
    initdb:
      database: forgejodb
      owner: forgejo
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: forgejo-backups
  enableSuperuserAccess: true
  superuserSecret:
    name: superuser
  affinity:
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: forgejo-backups
spec:
  configuration:
    destinationPath: s3://myanello-cnpg/forgejo
    endpointURL: https://s3.us-west-004.backblazeb2.com
    s3Credentials:
      accessKeyId:
        name: backblaze-cnpg-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: backblaze-cnpg-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
  retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: db-backup
spec:
  schedule: "0 0 2 * * 0"
  backupOwnerReference: self
  cluster:
    name: db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: forgejo-backups
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backblaze-cnpg-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: backblaze-cnpg-creds
    creationPolicy: Owner
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: BACKBLAZE_CNPG_KEY_ID
        metadataPolicy: None
        nullBytePolicy: Ignore
      secretKey: ACCESS_KEY_ID
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: BACKBLAZE_CNPG_SECRET_KEY
        metadataPolicy: None
        nullBytePolicy: Ignore
      secretKey: ACCESS_SECRET_KEY
