---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 2
      timeout: 3h
      insecure: false
      fetch_timeout: 5s
      fetch_interval: 2s
    cache:
      enabled: false
    container:
      docker_host: tcp://localhost:2375
      privileged: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        - name: register
          image: docker.io/gitea/act_runner:0.6.1
          workingDir: /data
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                act_runner register \
                  --no-interactive \
                  --instance https://forgejo.yanello.net \
                  --token "$(REGISTRATION_TOKEN)" \
                  --name forgejo-runner \
                  --labels forgejo-runner:docker
              fi
          env:
            - name: REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: runner-token
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: runner
          image: docker.io/gitea/act_runner:0.6.1
          command: ["act_runner", "daemon", "--config", "/config/config.yaml"]
          workingDir: /data
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
        - name: dind
          image: docker.io/docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: docker-storage
          emptyDir: {}
