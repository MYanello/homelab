---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./manifests/route.yaml

generators:
  - ./manifests/secret-generator.yaml

helmCharts:
  - name: authentik
    namespace: authentik-dev
    releaseName: authentik-dev
    repo: https://charts.goauthentik.io/
    version: "2026.2.2"
    valuesFile: ./manifests/values.yaml
