---
global:
  envFrom:
    - secretRef:
        name: authentik-secrets
  env:
    - name: AUTHENTIK_POSTGRESQL__HOST
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: host
    - name: AUTHENTIK_POSTGRESQL__USER
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: username
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: password
    - name: AUTHENTIK_POSTGRESQL__NAME
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: dbname
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

authentik:
  email:
    host: smtp.gmail.com
    port: 587
    username: "marcus.yanello@gmail.com"
    from: "authentik <marcus.yanello@gmail.com>"
    use_tls: true
    timeout: 30
  error_reporting:
    enabled: true
server:
  replicas: 1
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 750Mi
  livenessProbe:
    timeoutSeconds: 10
  readinessProbe:
    timeoutSeconds: 10
  startupProbe:
    timeoutSeconds: 10
worker:
  replicas: 1
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 500Mi
  livenessProbe:
    timeoutSeconds: 5
  startupProbe:
    timeoutSeconds: 5
  readinessProbe:
    timeoutSeconds: 5
redis:
  enabled: true
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 300m
        memory: 50Mi
      limits:
        memory: 250Mi
  replica:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 300m
        memory: 50Mi
      limits:
        memory: 250Mi
  sentinel:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 300m
        memory: 50Mi
      limits:
        memory: 100Mi
