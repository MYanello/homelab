---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: authentik-backups
spec:
  configuration:
    destinationPath: s3://myanello-cnpg/authentik
    endpointURL: https://s3.us-west-004.backblazeb2.com
    s3Credentials:
      accessKeyId:
        name: backblaze-cnpg-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: backblaze-cnpg-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
  retentionPolicy: "30d"
