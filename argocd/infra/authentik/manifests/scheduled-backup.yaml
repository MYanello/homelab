---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-cnpg-backup
spec:
  schedule: "0 0 2 * * 0"
  backupOwnerReference: self
  cluster:
    name: authentik-cnpg
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: authentik-backups
