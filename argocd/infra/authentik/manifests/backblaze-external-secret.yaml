---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backblaze-cnpg-creds
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: backblaze-cnpg-creds
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      nullBytePolicy: Ignore
      remoteRef:
        key: BACKBLAZE_CNPG_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      nullBytePolicy: Ignore
      remoteRef:
        key: BACKBLAZE_CNPG_SECRET_KEY
