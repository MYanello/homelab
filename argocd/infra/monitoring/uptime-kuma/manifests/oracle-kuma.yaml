---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  labels:
    app.kubernetes.io/instance: istio-resources
  name: oracle-kuma-httproute
spec:
  hostnames:
    - oracle-kuma.yanello.net
  parentRefs:
    - name: cilium-private-gateway
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: cilium
      sectionName: https
  rules:
    - backendRefs:
        - name: oracle-kuma-service
          group: ""
          kind: Service
          port: 3001
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-kuma-service
spec:
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: oracle-kuma-service-1 # by convention, use the name of the Service
  # as a prefix for the name of the EndpointSlice
  labels:
    # You should set the "kubernetes.io/service-name" label.
    # Set its value to match the name of the Service
    kubernetes.io/service-name: oracle-kuma-service
    endpointslice.kubernetes.io/managed-by: cluster-admin
addressType: IPv4
ports:
  - name: http # should match with the name of the service port defined above
    appProtocol: http
    protocol: TCP
    port: 3001
endpoints:
  - addresses:
      - 150.136.155.17
    conditions:
      ready: true
