---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: wan-exporter
  name: wan-exporter
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: wan-exporter
  template:
    metadata:
      labels:
        app: wan-exporter
    spec:
      containers:
        - image: harbor.yanello.net/library/wan-exporter:v0.3.0@sha256:56fba3d2d1c4d9a4e1ee5a97794cc627afd57c2859be67d0edafbc00cd518cd8
          name: wan-exporter
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: wan-exporter-secrets
          ports:
            - containerPort: 9101
              protocol: TCP
          resources:
            limits:
              memory: 64Mi
            requests:
              memory: 16Mi
              cpu: 10m
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9101
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9101
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
