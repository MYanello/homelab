---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unifi
  name: unifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: unifi
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - image: ghcr.io/lemker/unifi-os-server:v1.4.0
          imagePullPolicy: IfNotPresent
          name: unifi-os-server
          securityContext:
            privileged: true
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: UOS_SYSTEM_IP
              value: "unifi.yanello.net"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - echo $HOST_IP host.docker.internal >> /etc/hosts
          resources:
            limits:
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 1Gi
          ports:
            - containerPort: 443
              protocol: TCP
              name: webui
            - containerPort: 8080
              protocol: TCP
              name: device
            - containerPort: 8444
              protocol: TCP
              name: hotspot-secured
            - containerPort: 3478
              protocol: UDP
              name: stun
            - containerPort: 10003
              protocol: UDP
              name: discovery
            - containerPort: 5514
              protocol: UDP
              name: syslog
            - containerPort: 6789
              protocol: TCP
              name: speedtest
            - containerPort: 5005
              protocol: TCP
              name: rtp
            - containerPort: 9543
              protocol: TCP
              name: id-hub
            - containerPort: 28082
              protocol: TCP
              name: support-files
            - containerPort: 5671
              protocol: TCP
              name: aqmps
            - containerPort: 8880
              protocol: TCP
              name: hotspot-0
            - containerPort: 8881
              protocol: TCP
              name: hotspot-1
            - containerPort: 8882
              protocol: TCP
              name: hotspot-2
            - containerPort: 11084
              protocol: TCP
              name: metrics
          volumeMounts:
            - mountPath: /persistent
              name: data
              subPath: persistent
            - mountPath: /var/log
              name: data
              subPath: log
            - mountPath: /data
              name: data
              subPath: data
            - mountPath: /srv
              name: data
              subPath: srv
            - mountPath: /var/lib/unifi
              name: data
              subPath: unifi
            - mountPath: /var/lib/mongodb
              name: data
              subPath: mongodb
            - mountPath: /etc/rabbitmq/ssl
              name: data
              subPath: rabbitmq
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: unifi-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unifi-data
spec:
  storageClassName: truenas-ssd-nfs
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 32Gi
