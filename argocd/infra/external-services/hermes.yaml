---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Hermes
    gethomepage.dev/icon: hermes-agent
    gethomepage.dev/description: "Hermes Agent web dashboard for managing config, API keys, and sessions."
  name: hermes-httproute
spec:
  hostnames:
    - hermes.yanello.net
  parentRefs:
    - name: cilium-private-gateway
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: cilium
      sectionName: https
  rules:
    - backendRefs:
        - name: hermes-service
          group: ""
          kind: Service
          port: 9119
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-service
spec:
  ports:
    - name: http
      protocol: TCP
      port: 9119
      targetPort: 9119
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: hermes-service-1
  labels:
    kubernetes.io/service-name: hermes-service
    endpointslice.kubernetes.io/managed-by: cluster-admin
addressType: IPv4
ports:
  - name: http
    appProtocol: http
    protocol: TCP
    port: 9119
endpoints:
  - addresses:
      - 192.168.10.9
    conditions:
      ready: true
