---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bentopdf
  name: bentopdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bentopdf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bentopdf
    spec:
      containers:
        - image: harbor.yanello.net/ghcr/alam00000/bentopdf:v2.7.0@sha256:8d114be6e8be35165d778499a8a6670b51c5f0e4088c0d8ffda8f44ce08bef2c
          imagePullPolicy: IfNotPresent
          name: bentopdf
          resources:
            limits:
              memory: 500Mi
            requests:
              cpu: 25m
              memory: 50Mi
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
