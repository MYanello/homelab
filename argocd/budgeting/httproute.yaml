---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: budgeting-httproute
spec:
  parentRefs:
    - name: cilium-private-gateway
      namespace: cilium
      sectionName: https
  hostnames:
    - budgeting.yanello.net
  rules:
    - backendRefs:
        - name: budgeting
          namespace: budgeting
          port: 8080
