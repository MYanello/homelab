---
image:
  tag: latest
  pullPolicy: Always

config:
  db:
    driver: "postgres"
    host: "db-rw"
    port: "5432"
    name: "budgeting"
    existingSecret: "db-app"
    existingSecretUserKey: user
    existingSecretPasswordKey: password
oidc:
  enabled: true
  issuer: "https://authentik.yanello.net/application/o/budgeting/"
  redirectUrl: "https://budgeting.yanello.net/auth/callback"
  existingSecret: "budgeting-secrets"
  existingSecretClientIdKey: "OIDC_CLIENT_ID"
  existingSecretClientSecretKey: "OIDC_CLIENT_SECRET"
