---
config:
  db:
    driver: "postgres"
    host: "db-rw"
    port: "5432"
    name: "budgeting"
    existingSecret: "db-app"
    existingSecretUserKey: user
    existingSecretPasswordKey: password
oidc:
  enabled: true
  issuer: "Authentik"
  redirectUrl: "https://authentik.yanello.net/application/o/budgeting/"
  # Reference a pre-existing secret instead of creating one
  existingSecret: "budgeting-secrets"
  existingSecretClientIdKey: "OIDC_CLIENT_ID"
  existingSecretClientSecretKey: "OIDC_CLIENT_SECRET"
