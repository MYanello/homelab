---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warrior
  labels:
    app: warrior
spec:
  replicas: 6
  selector:
    matchLabels:
      app: warrior
  template:
    metadata:
      labels:
        app: warrior
    spec:
      containers:
        - image: atdr.meo.ws/archiveteam/warrior-dockerfile:latest@sha256:cdacda79bc812672975d34867e0a3d08a7681370b3c64633d413e9e1e7a9ab78
          name: warrior
          ports:
            - containerPort: 8001
              protocol: TCP
          resources:
            limits:
              memory: "1Gi"
            requests:
              cpu: "100m"
              memory: "500Mi"
          env:
            - name: DOWNLOADER
              value: mjy
            - name: SELECTED_PROJECT
              value: auto
            - name: CONCURRENT_ITEMS
              value: "5"
            - name: SHARED_RSYNC_THREADS
              value: "20"
      nodeSelector:
        kubernetes.io/arch: amd64
