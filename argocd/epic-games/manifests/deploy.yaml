apiVersion: apps/v1
kind: Deployment
metadata:
  name: epic-games
  labels:
    app: epic-games
spec:
  replicas: 1
  serviceName: epic-games
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: epic-games
  template:
    metadata:
      labels:
        app: epic-games
    spec:
      containers:
        - name: epic-games
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          image: ghcr.io/claabs/epicgames-freegames-node:latest@sha256:6b54783ea337cde4fe286c22e6e1c4f53ffe0c62c2ffb07de4b3e06c1ee51e80
          volumeMounts:
            - mountPath: /usr/app/config/config.json5
              name: config
              subPath: config.enc.json5
          command:
            - sleep
            - inf
      volumes:
        - name: config
          secret:
            secretName: config
