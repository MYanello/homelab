---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bookorbit-db
spec:
  podAnnotations:
    backup.velero.io/backup-volumes: pgdata
  instances: 1
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql-standard-trixie
    major: 18
  storage:
    size: 5Gi
    storageClass: truenas-ssd
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
  bootstrap:
    initdb:
      database: bookorbit
      owner: bookorbit
  enableSuperuserAccess: true
