---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: honcho-env
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: honcho-env
    creationPolicy: Owner
  data:
    - secretKey: LLM_OPENAI_API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: SUMMARY_MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DERIVER_MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: LLM_EMBEDDING_API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: LLM_VLLM_API_KEY
      remoteRef:
        key: HONCHO_API_KEY
    - secretKey: LLM_OPENAI_COMPATIBLE_API_KEY
      remoteRef:
        key: HONCHO_API_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: honcho-db
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: honcho-db
    creationPolicy: Owner
  data:
    - secretKey: DB_CONNECTION_URI
      remoteRef:
        key: HONCHO_DB_URI
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: honcho-config
data:
  CACHE_URL: "redis://redis:6379/0?suppress=true"
  CACHE_ENABLED: "true"
  METRICS_ENABLED: "false"
  AUTH_ENABLED: "true"
  LLM_VLLM_BASE_URL: "https://api.inference.wandb.ai/v1"
  LLM_EMBEDDING_BASE_URL: "https://api.inference.wandb.ai/v1"
  LLM_EMBEDDING_MODEL: "openai/text-embedding-3-small"
  DERIVER_MODEL_CONFIG__TRANSPORT: "openai"
  DERIVER_MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  SUMMARY_MODEL_CONFIG__TRANSPORT: "openai"
  SUMMARY_MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT: "openai"
  DREAM_DEDUCTION_MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
  DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT: "openai"
  DREAM_INDUCTION_MODEL_CONFIG__MODEL: "deepseek/deepseek-v4-flash"
  DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://api.inference.wandb.ai/v1"
