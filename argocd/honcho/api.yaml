---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honcho-api
  template:
    metadata:
      labels:
        app: honcho-api
    spec:
      initContainers:
        - name: db-migrate
          image: harbor.yanello.net/library/honcho:v3.0.10@sha256:fb443067febe9d82aefd2a490c919d01fc31ebbb50042e8dc5d5cdb75c790c85
          command: ["/app/.venv/bin/python", "scripts/provision_db.py"]
          envFrom:
            - secretRef:
                name: honcho-env
      containers:
        - name: api
          image: harbor.yanello.net/library/honcho:v3.0.10@sha256:fb443067febe9d82aefd2a490c919d01fc31ebbb50042e8dc5d5cdb75c790c85
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: honcho-env
            - configMapRef:
                name: honcho-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: honcho-api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: honcho-api
