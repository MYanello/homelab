---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deriver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honcho-deriver
  template:
    metadata:
      labels:
        app: honcho-deriver
    spec:
      containers:
        - name: deriver
          image: harbor.yanello.net/library/honcho:v3.0.10
          imagePullPolicy: Always
          command: ["/app/.venv/bin/python", "-m", "src.deriver"]
          envFrom:
            - secretRef:
                name: honcho-env
            - secretRef:
                name: honcho-db
            - configMapRef:
                name: honcho-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
