apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honcho-access
spec:
  podSelector:
    matchLabels:
      app: honcho-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.1.0/24
      ports:
        - protocol: TCP
          port: 8080