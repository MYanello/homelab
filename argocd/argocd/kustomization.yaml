apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./manifests/svc.yaml
  - ./manifests/cm.yaml
  - ./manifests/tlsRoute.yaml
  - ./manifests/deploy.yaml
  - ./manifests/cert.yaml

generators:
  - ./manifests/secret-generator.yaml

patches:
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ignore
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
  - target:
      kind: StatefulSet
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: ignore
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
  - target:
      kind: DaemonSet
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: ignore
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
