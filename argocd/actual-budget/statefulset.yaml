---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  serviceName: actual-budget
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      containers:
        - name: actual-budget
          image: harbor.yanello.net/ghcr/actualbudget/actual-server:26.7.0@sha256:e18b7fbfec6157a368fad4146563f397502e9da70a120aeaeac63b4977405d1c
          ports:
            - containerPort: 5006
              protocol: TCP
          env:
            - name: ACTUAL_OPENID_DISCOVERY_URL
              value: "https://authentik.yanello.net/application/o/actual-budget/"
            - name: ACTUAL_OPENID_SERVER_HOSTNAME
              value: "https://actual.yanello.net"
            - name: ACTUAL_OPENID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: actual-budget-secrets
                  key: ACTUAL_OPENID_CLIENT_ID
            - name: ACTUAL_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: actual-budget-secrets
                  key: ACTUAL_OPENID_CLIENT_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: truenas-ssd
        resources:
          requests:
            storage: 2Gi
