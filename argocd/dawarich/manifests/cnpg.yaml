---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dawarich-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgis:18
  storage:
    size: 10Gi
    storageClass: truenas-ssd
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "512MB"
  bootstrap:
    initdb:
      database: dawarich
      owner: dawarich
      secret:
        name: dawarich-db-credentials
  enableSuperuserAccess: true
  superuserSecret:
    name: dawarich-superuser
