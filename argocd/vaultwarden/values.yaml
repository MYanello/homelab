---
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
domain: "https://bitwarden.yanello.net"
signupsAllowed: false
replicas: 1
storage:
  data:
    name: data
    size: 15Gi
    class: longhorn-xfs
    keepPvc: true
    accessMode: ReadWriteOnce
adminToken:
  existingSecret: vw-admin-secret
  existingSecretKey: adminToken
resources:
  limits:
    memory: 500Mi
  requests:
    cpu: 20m
    memory: 200Mi
