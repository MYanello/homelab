resources:
  - ./vs.yaml
  - ./cm.yaml

patches:
  - target:
      kind: Deployment
      name: nextcloud
    patch: |-
      - op: add
        path: /spec/template/spec/hostNetwork
        value: true
      - op: add
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirstWithHostNet        

generators:
  - ./secret-generator.yaml

helmCharts:
    - name: nextcloud
      repo: https://nextcloud.github.io/helm/
      version: "6.6.3"
      releaseName: nextcloud
      namespace: nextcloud
      valuesFile: ./values.yaml

images:
  - name: nextcloud
    newTag: 29.0.12@sha256:b7b36d25ed9682acc26343a6c40f608b868e5a84f98f3af49b8152a3ce7dfb63
  - name: docker.io/bitnami/mariadb
    newTag: '10.11@sha256:ab38eb8e04b1d286cd1fb268d08013bc7d25f9015a9c374594256bcd4a8d1556'
