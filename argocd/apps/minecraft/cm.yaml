apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/part-of: mc
  name: mc-config
data:
  EULA: "TRUE"
  DEBUG: "true"
  MEMORY: "8G"
  TZ: "America/Chicago"
  REMOVE_OLD_MODS: "true"
  SNOOPER_ENABLED: "false"
  EXEC_DIRECTLY: "true"
  #MODPACK_PLATFORM: AUTO_CURSEFORGE
  #CF_SLUG: gt-new-horizons
  GUI: "FALSE"
  #CF_EXCLUDE_MODS: custom-main-menu,defaultserverlist,default-world-generator
  CF_FORCE_SYNCHRONIZE: "true"
  MODPACK: https://downloads.gtnewhorizons.com/ServerPacks/GT_New_Horizons_2.7.2_Server_Java_17-21.zip
