---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parser
  labels:
    app: parser
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: parser
  template:
    metadata:
      labels:
        app: parser
    spec:
      containers:
        - image: harbor.yanello.net/ghcr/dictionarry-hub/profilarr-parser:2.0.2@sha256:a7f6b6ad774d1f9f8a394e2449872eb8733e3ac1c6307491936ec9fcb3ee6c37
          imagePullPolicy: IfNotPresent
          name: parser
          ports:
            - containerPort: 5000
              protocol: TCP
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
