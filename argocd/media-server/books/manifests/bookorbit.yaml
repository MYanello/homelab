---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookorbit
  labels:
    app: bookorbit
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: bookorbit
  template:
    metadata:
      annotations:
        backup.velero.io/backup-volumes: data
      labels:
        app: bookorbit
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: bookorbit
          image: harbor.yanello.net/ghcr/bookorbit/bookorbit:2.0.1@sha256:70bef7bef8b0d0fa938c980b5a128f86bbde656cde04f4ab0549b9b91ebb2e14
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: bookorbit-secrets
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bookorbit-db-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookorbit-db-app
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: bookorbit-db-app
                  key: dbname
            - name: POSTGRES_HOST
              value: bookorbit-db-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: APP_URL
              value: https://bookorbit.yanello.net
            - name: CLIENT_URL
              value: https://bookorbit.yanello.net
            - name: NODE_MAX_OLD_SPACE_SIZE
              value: "2048"
            - name: OIDC_ALLOW_LOCAL_ISSUERS
              value: "true"
          volumeMounts:
            - mountPath: /books
              name: books
            - mountPath: /data
              name: data
            - mountPath: /ingest
              name: ingest
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 4Gi
      volumes:
        - name: ingest
          persistentVolumeClaim:
            claimName: ingest
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: books
          persistentVolumeClaim:
            claimName: books
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookorbit-http-route
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: BookOrbit
    gethomepage.dev/icon: bookorbit
    gethomepage.dev/description: Self-hosted library management and reading platform.
    gethomepage.dev/pod-selector: app=bookorbit
spec:
  parentRefs:
    - name: cilium-private-gateway
      namespace: cilium
      sectionName: https
  hostnames:
    - bookorbit.yanello.net
  rules:
    - backendRefs:
        - name: bookorbit
          namespace: books
          port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: bookorbit
  labels:
    app: bookorbit
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: bookorbit
