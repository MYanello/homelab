---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
      annotations:
        backup.velero.io/backup-volumes: data
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: timescaledb
          image: timescale/timescaledb-ha:pg18.1-ts2.25.0
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # PG writes temp files + runtime config
            capabilities:
              drop: [ALL]
            seccompProfile: null
            type: RuntimeDefault
          args:
            - "-c"
            - "timescaledb.license=timescale"
            - "-c"
            - "timescaledb.max_tuples_decompressed_per_dml_transaction=0"
            - "-c"
            - "max_locks_per_transaction=4096"
            - "-c"
            - "timescaledb.telemetry_level=off"
            # Tuned for 4 GB limit, SSD storage
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "effective_cache_size=2GB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=256MB"
            - "-c"
            - "wal_buffers=64MB"
            - "-c"
            - "max_wal_size=2GB"
            - "-c"
            - "checkpoint_completion_target=0.9"
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "effective_io_concurrency=200"
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: tracearr
            - name: PGDATA
              value: /home/postgres/pgdata/data
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracearr-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: tracearr
          volumeMounts:
            - name: data
              mountPath: /home/postgres/pgdata/data
            - name: dshm
              mountPath: /dev/shm
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tracearr"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tracearr"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: truenas-ssd
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
