---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
      annotations:
        backup.velero.io/backup-volumes: data
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb-ha:pg18.1-ts2.25.0
          args:
            - "postgres"
            - "-c"
            - "timescaledb.license=timescale"
            - "-c"
            - "timescaledb.max_tuples_decompressed_per_dml_transaction=0"
            - "-c"
            - "max_locks_per_transaction=4096"
            - "-c"
            - "timescaledb.telemetry_level=off"
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: tracearr
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracearr-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: tracearr
          volumeMounts:
            - name: data
              mountPath: /home/postgres/pgdata/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tracearr"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tracearr"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: truenas-ssd
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
